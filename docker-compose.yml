services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: tcs-dynamodb-local
    ports:
      - '8000:8000'
    command: '-jar DynamoDBLocal.jar -sharedDb -inMemory'
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:8000 > /dev/null 2>&1']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: tcs-elasticmq
    ports:
      - '9324:9324'
    volumes:
      - ./docker/elasticmq.conf:/opt/elasticmq.conf

  init:
    image: amazon/aws-cli:latest
    container_name: tcs-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./docker/init.sh:/init.sh
    entrypoint: ['/bin/sh', '/init.sh']

  app:
    build: .
    container_name: tcs-orders-api
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - AWS_REGION=us-east-1
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - SQS_ENDPOINT=http://elasticmq:9324
      - ORDERS_TABLE_NAME=orders
      - AUDIT_LOGS_TABLE_NAME=audit_logs
      - ORDERS_QUEUE_URL=http://elasticmq:9324/000000000000/orders-queue
      - BEARER_TOKEN=dev-secret-token
    depends_on:
      init:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started
